name: Backend Tests & Coverage

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: himart_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: ./backend
        env:
          DEBUG: "False"
          SECRET_KEY: "test-secret-key"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/himart_test"
          REDIS_URL: "redis://localhost:6379/0"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          python manage.py migrate

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          DEBUG: "False"
          SECRET_KEY: "test-secret-key"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/himart_test"
          REDIS_URL: "redis://localhost:6379/0"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          pytest --cov=apps --cov-report=xml --cov-report=html -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: backend/htmlcov

      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.existsSync('./backend/.coverage') ? '✓ Coverage report generated' : 'N/A';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 测试结果\n\n✓ 测试完成\n✓ ${coverage}\n\n详细报告在 Artifacts 中查看`
            });

name: Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [Backend Tests]
    types: [completed]
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/himart-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/himart-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        if: secrets.DOCKER_USERNAME != ''

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/himart-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/himart-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        if: secrets.DOCKER_USERNAME != ''

      - name: Create deployment summary
        run: |
          echo "## 部署信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- 时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
